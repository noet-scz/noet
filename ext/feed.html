<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Лента · noet</title>
<style>
  :root{--bg:#0a0a0d;--panel:#111118;--panel2:#16161f;--bd:#24242e;--bd2:#2f2f3a;--fg:#f1f1f5;--mut:#9595a3;--acc:#7c5cff;--acc2:#9d8bff}
  *{box-sizing:border-box}html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 75% at 50% -12%,#16121f 0%,transparent 58%) fixed,var(--bg);color:var(--fg);font:15px/1.55 -apple-system,system-ui,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:38rem;margin:0 auto;padding:2.4rem 1.2rem 5rem}
  .top{display:flex;align-items:center;gap:.55rem;margin-bottom:.3rem}.top img{width:28px;height:28px}.top b{font-size:1.05rem}
  h1{font-size:1.6rem;letter-spacing:-.3px;margin:.5rem 0 .2em}.lead{color:var(--mut);margin:0 0 1.3rem}
  .nav{font-size:.88rem;margin-bottom:1.2rem}.nav a{color:var(--acc2);margin-right:1rem;text-decoration:none}
  textarea{width:100%;background:var(--bg);border:1px solid var(--bd2);color:var(--fg);border-radius:11px;padding:.65rem .8rem;font:inherit;resize:vertical;min-height:3rem;outline:none}
  textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,92,255,.18)}
  .row{display:flex;gap:.6rem;align-items:center;margin-top:.5rem}
  button{border:0;border-radius:10px;padding:.5rem 1.1rem;font:inherit;font-weight:600;cursor:pointer;background:var(--acc);color:#fff}
  button:hover{background:#6b4dff}
  .msg{font-size:.84rem;color:var(--mut)}.msg.err{color:#ff7b8a}
  .box{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:.85rem 1rem;margin-bottom:.7rem}
  .who{color:var(--acc2);font-weight:650;font-size:.92rem}.when{color:var(--mut);font-size:.78rem;margin-left:.5rem}
  .txt{white-space:pre-wrap;word-break:break-word;margin:.3rem 0 0}.txt img{max-width:100%;border-radius:8px;margin-top:.3rem;display:block}
  .mut{color:var(--mut)}a{color:var(--acc2)}
</style></head>
<body><div class="wrap">
  <div class="top"><img src="logo.svg" alt=""><b>noet</b></div>
  <h1>Лента</h1>
  <p class="lead">Общая лента сообщества. Сообщения подписаны твоим ключом и живут в сети, не на сервере.</p>
  <div class="nav"><a id="lhome" href="#">Главная</a><a id="lpeople" href="#">Люди</a></div>
  <div class="box" id="composer"><textarea id="text" placeholder="написать в ленту…"></textarea>
    <div class="row"><button id="send">Отправить</button><span class="msg" id="m"></span></div></div>
  <div id="list"><div class="mut">загружаю…</div></div>
</div>
<script type="module" src="feed.js"></script>
</body></html>
