<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>noet</title>
<style>
  :root{--bg:#0a0a0c;--fg:#ececf2;--mut:#8b8b98;--bd:#23232c;--acc:#7c5cff;--acc2:#9d8bff;--panel:#15151c}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--fg);font:16px/1.6 system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:clamp(4rem,18vh,11rem) 1.2rem 4rem}
  .mark{display:flex;align-items:center;gap:.7rem;margin-bottom:1.6rem}
  .mark img{width:54px;height:54px}.mark h1{font-size:2.6rem;margin:0;font-weight:680;letter-spacing:-.5px}
  form{width:100%;max-width:34rem;display:flex;gap:.5rem}
  #q{flex:1;font-size:1.05rem;border-radius:14px;padding:.95rem 1.1rem;background:var(--panel);border:1px solid var(--bd);color:var(--fg)}
  #q::placeholder{color:#5b5b66}
  .go{background:var(--acc);border:0;border-radius:14px;color:#fff;padding:0 1.25rem;display:inline-flex;align-items:center;cursor:pointer}
  .go:hover{background:#6c4dff}.go svg{width:21px;height:21px}
  .links{margin-top:1.3rem;display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
  .links a{font-size:.9rem;color:var(--mut);background:var(--panel);border:1px solid var(--bd);border-radius:999px;padding:.3rem .9rem;text-decoration:none}
  .links a:hover{border-color:var(--acc);color:var(--fg)}
  .hint{color:var(--mut);font-size:.85rem;margin-top:1rem}
</style></head>
<body>
  <div class="mark"><img src="/logo.svg" alt=""><h1>noet</h1></div>
  <form id="f" autocomplete="off">
    <input id="q" placeholder="имя: например manifest.nt" autofocus>
    <button class="go" type="submit" aria-label="open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg></button>
  </form>
  <div class="links" id="links"></div>
  <div class="hint">Имена резолвятся в IPFS прямо в браузере. Сервера в просмотре нет.</div>
<script>
const $=s=>document.querySelector(s);
const NAME=/^[a-z0-9-]{1,32}\.(nt|me)$/i;
function go(v){ v=v.trim().toLowerCase(); if(!v) return; if(!NAME.test(v)){ v=v.replace(/[^a-z0-9-]/g,'')+'.nt'; } location.href='http://'+v+'/'; }
$('#f').addEventListener('submit',e=>{e.preventDefault();go($('#q').value);});
// известные имена из зеркала
fetch('https://noet-scz.github.io/noet/dist/names.json',{cache:'no-cache'})
  .then(r=>r.ok?r.json():{}).then(names=>{
    const box=$('#links'); const keys=Object.keys(names).slice(0,8);
    for(const k of keys){ const a=document.createElement('a'); a.href='http://'+k+'/'; a.textContent=k; box.appendChild(a); }
  }).catch(()=>{});
</script>
</body></html>
