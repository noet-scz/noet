<!doctype html><html><body>
<iframe id="f" src="render.html" style="width:300px;height:120px"></iframe>
<script>
window.__result = 'none';
// роль view.js: отвечаем на __noetCall и отдаём документ по 'ready'
const doc = '<!doctype html><html><body><div id=out>?</div>'
  + '<scr'+'ipt>window.noet.me().then(function(m){document.getElementById("out").textContent="PK:"+m.pubkey;parent.postMessage({test:document.getElementById("out").textContent},"*");});</scr'+'ipt>'
  + '</body></html>';
window.addEventListener('message', function(e){
  var d = e.data;
  if (d && d.__noetRender === 'ready') { e.source.postMessage({__noetRender:'doc', html:doc, base:''}, '*'); return; }
  if (d && d.__noetCall) { e.source.postMessage({__noetRes:1, id:d.id, result:{pubkey:'deadbeefcafe'}}, '*'); return; }
  if (d && d.test) { window.__result = d.test; }
});
</script></body></html>
