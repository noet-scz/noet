<!doctype html><html lang=ru><head>
<meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1">
<title>noet · личность</title>
<link rel=icon href="/logo.svg"><link rel=stylesheet href="/app.css">
<style>
  .hd{max-width:34rem;margin:0 auto;display:flex;align-items:center;padding:1.1rem 1.2rem}
  .hd .brand{color:var(--fg);text-decoration:none}
  .hd .brand b{font-size:1.05rem}
  .lang{display:flex;gap:.2rem;background:var(--panel2);border:1px solid var(--bd);border-radius:999px;padding:.15rem}
  .lang button{background:0;border:0;color:var(--mut);border-radius:999px;padding:.2rem .6rem;font-size:.8rem;cursor:pointer}
  .lang button.on{background:var(--acc);color:#fff}
  .wrap{max-width:34rem;margin:0 auto;padding:.5rem 1.2rem 4rem;display:flex;flex-direction:column;gap:1rem}
  .card{background:var(--panel);border:1px solid var(--bd);border-radius:16px;padding:1.3rem}
  h1{font-size:1.4rem;margin:0 0 .4rem}h2{font-size:1.05rem;margin:0 0 .6rem}
  .mut{color:var(--mut);font-size:.92rem}
  label{display:block;color:var(--mut);font-size:.82rem;margin:.9rem 0 .35rem}
  input,textarea{width:100%;font-size:.97rem}textarea{min-height:60px;resize:vertical}
  .btn{width:100%;margin-top:1rem;background:var(--acc);border:0;border-radius:12px;color:#fff;padding:.8rem;font-size:1rem;font-weight:600;cursor:pointer}
  .btn:hover{background:#6c4dff}
  .btn.big{padding:.95rem;font-size:1.05rem}
  .btn.ghost{background:var(--panel2);border:1px solid var(--bd);color:var(--fg);font-weight:500}
  .lnk{background:0;border:0;color:var(--acc2);cursor:pointer;font-size:.9rem;padding:.3rem 0}
  .lnk.danger{color:#ff8b8b;display:block;margin-top:.6rem}
  .or{margin-top:.8rem;text-align:center}
  .hide{display:none}
  .ok{background:#0f2620;border:1px solid #1c5c45;border-radius:10px;padding:.6rem .8rem;color:var(--ok);font-size:.9rem;margin:.4rem 0}
  .msg{font-size:.88rem;margin-top:.6rem;min-height:1.1em}.msg.err{color:#ff8b8b}.msg.ok{color:var(--ok)}
  .phd{display:flex;align-items:center;gap:1rem;margin-bottom:.4rem}
  .bigav{width:64px;height:64px;border-radius:50%}
  .dn{font-size:1.2rem;font-weight:650}
  .row2{display:flex;gap:.6rem;align-items:center}.row2>*{flex:1;margin-top:0}
  .sep{height:1px;background:var(--bd);margin:1rem 0}
  code{background:#000;border:1px solid var(--bd);border-radius:5px;padding:.1em .4em;font-size:.8rem;word-break:break-all}
  .key{margin-top:.8rem}
  /* редактор — полноэкранный layout */
  .ed-page{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}
  .ed-bar{display:flex;align-items:center;gap:.8rem;padding:.55rem 1.2rem;border-bottom:1px solid var(--bd);flex-shrink:0}
  .ed-bar-url{color:var(--mut);font-size:.85rem}
  .ed-mode-toggle{margin-left:auto;display:flex;background:var(--panel2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
  .ed-mode-toggle button{background:none;border:none;color:var(--mut);padding:.28rem .85rem;font-size:.83rem;cursor:pointer}
  .ed-mode-toggle button.active{background:var(--acc);color:#fff}
  .ed-pub-btn{width:auto;margin:0;padding:.45rem 1.3rem;font-size:.9rem}
  .ed-title-full{width:100%;font-size:1.9rem;font-weight:700;padding:.9rem 1.5rem .3rem;background:transparent;border:none;outline:none;color:var(--fg);flex-shrink:0}
  .ed-area{flex:1;width:100%;resize:none;font-size:1rem;line-height:1.72;padding:.5rem 1.5rem 1rem;background:transparent;border:none;outline:none;color:var(--fg)}
  .ed-code{font-family:ui-monospace,monospace;font-size:.9rem;line-height:1.55;tab-size:2}
  .ed-status{padding:.35rem 1.5rem;border-top:1px solid var(--bd);flex-shrink:0;min-height:1.8rem}
</style></head><body>
<div id=app><div class=wrap><div class=card><div class=mut>…</div></div></div></div>
<script src="/i18n.js"></script>
<script type="module" src="/account.js"></script>
</body></html>
