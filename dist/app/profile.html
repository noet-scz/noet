<!doctype html>
<html lang="ru" data-page="id.nt"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Моя страница · noet</title>
<style>
  :root{--bg:#0a0a0d;--panel:#111118;--panel2:#16161f;--bd:#24242e;--bd2:#2f2f3a;--fg:#f1f1f5;--mut:#9595a3;--acc:#7c5cff;--acc2:#9d8bff;--ok:#3ddc97;--ring:0 0 0 3px rgba(124,92,255,.18)}
  *{box-sizing:border-box}html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 75% at 50% -12%,#16121f 0%,transparent 58%) fixed,var(--bg);color:var(--fg);font:15px/1.55 -apple-system,system-ui,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:36rem;margin:0 auto;padding:.6rem 1.2rem 5rem}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:1.3rem;box-shadow:0 8px 30px rgba(0,0,0,.3);margin-bottom:1rem}
  .phd{display:flex;align-items:center;gap:1rem}.av{width:64px;height:64px;border-radius:50%;flex:0 0 64px;object-fit:cover}
  .dn{font-size:1.4rem;font-weight:700;letter-spacing:-.3px}
  .tag{color:var(--mut);font-size:.95rem;margin-top:.15rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
  .pen{background:0;border:0;color:var(--mut);cursor:pointer;font-size:.85rem;padding:.1rem .25rem;border-radius:6px}.pen:hover{color:var(--acc2);background:var(--bg)}
  .tag input{background:var(--bg);border:1px solid var(--bd2);color:var(--fg);border-radius:8px;padding:.3rem .5rem;font:inherit;width:9rem;outline:none}.tag input:focus{border-color:var(--acc)}
  .tag .pre{color:var(--mut)}
  .ib{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:.3rem .6rem;cursor:pointer;font-weight:600}.ib:hover{background:#6b4dff}
  .ig{background:0;border:1px solid var(--bd2);color:var(--mut);border-radius:8px;padding:.3rem .55rem;cursor:pointer}
  label{display:block;color:var(--mut);font-size:.82rem;margin:.9rem 0 .35rem}
  input,textarea{width:100%;background:var(--bg);border:1px solid var(--bd2);color:var(--fg);border-radius:11px;padding:.65rem .8rem;font:inherit;outline:none;transition:.15s}
  input:focus,textarea:focus{border-color:var(--acc);box-shadow:var(--ring)}input::placeholder,textarea::placeholder{color:#5a5a68}
  textarea{resize:vertical;min-height:7rem}textarea.code{font:13px/1.6 ui-monospace,monospace;min-height:12rem}
  .row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:1rem}
  button{border:0;border-radius:11px;padding:.6rem 1.1rem;font:inherit;font-weight:600;cursor:pointer;transition:.1s}
  .pri{background:var(--acc);color:#fff}.pri:hover{background:#6b4dff}.pri:disabled{opacity:.55}
  .gho{background:var(--bg);border:1px solid var(--bd2);color:var(--fg)}.gho:hover{border-color:var(--acc)}
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--bd2);border-radius:11px;padding:3px;gap:3px}.seg button{background:0;color:var(--mut);padding:.4rem .9rem}.seg button.on{background:var(--acc);color:#fff}
  .name-row{display:flex}.name-row input{border-radius:11px 0 0 11px;border-right:0}.name-row .suf{display:flex;align-items:center;background:#1b1b24;border:1px solid var(--bd2);border-radius:0 11px 11px 0;padding:0 .85rem;color:var(--mut);font-weight:600}
  .pageurl{font-size:1.05rem;color:var(--acc2);font-weight:600;text-decoration:none}.sp{flex:1}
  .msg{font-size:.9rem;margin-top:.5rem;min-height:1.1em}.msg.ok{color:var(--ok)}.msg.err{color:#ff7b8a}.msg a{color:var(--acc2)}
  h3{font-size:1rem;margin:0 0 .6rem}a{color:var(--acc2)}.mut{color:var(--mut)}
</style></head>
<body>
  <div class="wrap"><div id="app"><div class="card mut">загружаю…</div></div></div>
<script>
(function () {
  var $ = function (s) { return document.querySelector(s); };
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); };
  var tagv = function (ev, k) { var t = (ev.tags || []).find(function (x) { return x[0] === k; }); return t ? t[1] : ''; };
  var hf = function (n) { return String(n || '').replace(/\.(me|nt)$/i, ''); };

  var PK = null, NAME = null, CLAIMID = null, PROFILE = {}, PAGE = null, mode = 'text', edTitle = '', edBody = '', edHtml = '', editingTag = false;

  function avatar(pk, name, pic) { if (pic && /^(https?:|data:)/i.test(pic)) return pic; var h = 0, seed = pk || name || '?'; for (var i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0; var hue = h % 360, ch = (name || '').trim() ? name.trim()[0].toUpperCase() : '';
    return 'data:image/svg+xml,' + encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='32' fill='hsl(" + hue + " 60% 50%)'/>" + (ch ? "<text x='32' y='43' font-family='system-ui' font-size='30' font-weight='600' fill='white' text-anchor='middle'>" + esc(ch) + "</text>" : "") + "</svg>"); }
  function pageFromText(title, body) { var blocks = String(body || '').replace(/\r/g, '').split(/\n{2,}/).map(function (b) { b = b.trim(); return b ? '<p>' + esc(b).replace(/\n/g, '<br>') + '</p>' : ''; }).join('\n  ');
    return '<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + esc(title || 'Моя страница') + '</title><style>body{font:18px/1.7 -apple-system,system-ui,sans-serif;background:#0d0d12;color:#ececf2;max-width:40rem;margin:0 auto;padding:3.5rem 1.3rem}h1{color:#fff;font-size:2.1rem;line-height:1.15;margin:0 0 1rem}p{margin:0 0 1.1rem}a{color:#9d8bff}</style></head><body>' + (title ? '<h1>' + esc(title) + '</h1>' : '') + '\n  ' + (blocks || '<p></p>') + '\n</body></html>'; }

  async function load() {
    try { PK = (await noet.me()).pubkey; } catch (e) { PK = null; }
    if (!PK) { $('#app').innerHTML = '<div class="card">Создай личность в расширении noet (иконка в браузере), потом обнови. <div class="row"><button class="pri" id="rl">Обновить</button></div></div>'; $('#rl').onclick = function () { location.reload(); }; return; }
    var claims = (await noet.query({ kinds: [31111], authors: [PK], limit: 20 })).filter(function (e) { return /\.(me|nt)$/i.test(tagv(e, 'd')); });
    claims.sort(function (a, b) { return b.created_at - a.created_at; });
    NAME = claims[0] ? tagv(claims[0], 'd') : null; CLAIMID = claims[0] ? claims[0].id : null;
    var profs = await noet.query({ kinds: [0], authors: [PK], limit: 1 });
    try { PROFILE = profs[0] ? JSON.parse(profs[0].content) : {}; } catch (e) { PROFILE = {}; }
    PAGE = null; if (NAME) { var recs = await noet.query({ kinds: [31002], authors: [PK], '#d': [NAME], limit: 1 }); if (recs[0]) { try { PAGE = JSON.parse(recs[0].content); } catch (e) {} } }
    home();
  }

  function tagHtml() {
    var handle = hf(NAME);
    if (!NAME) return '<div class="tag">имя ещё не занято</div>';
    if (!editingTag) return '<div class="tag">@' + esc(handle) + ' <button class="pen" id="pen" title="сменить имя">✎</button></div>';
    return '<div class="tag"><span class="pre">@</span><input id="th" value="' + esc(handle) + '" maxlength="32"> <button class="ib" id="tok">✓</button> <button class="ig" id="tx">✕</button><span class="msg" id="tmsg" style="margin:0"></span></div>';
  }

  function home() {
    var handle = hf(NAME), dn = PROFILE.name || handle || 'без имени';
    $('#app').innerHTML =
      '<div class="card"><div class="phd"><img class="av" src="' + avatar(PK, dn, PROFILE.picture) + '"><div><div class="dn">' + esc(dn) + '</div>' + tagHtml() + '</div></div>' +
        '<label>Отображаемое имя</label><input id="p_name" value="' + esc(PROFILE.name || '') + '" placeholder="как тебя показывать">' +
        '<label>Аватар (ссылка на картинку)</label><input id="p_pic" value="' + esc(PROFILE.picture || '') + '" placeholder="https://…/avatar.png">' +
        '<label>О себе</label><textarea id="p_about" placeholder="пара слов">' + esc(PROFILE.about || '') + '</textarea>' +
        '<div class="row"><button class="gho" id="psave">Сохранить профиль</button><span class="msg" id="pmsg" style="margin:0"></span></div></div>' +
      (NAME ? '<div class="card"><label style="margin-top:0">Твоя страница</label><div class="row" style="margin-top:.2rem"><a class="pageurl" href="http://' + esc(NAME) + '/" target="_blank">' + esc(NAME) + '</a><span class="sp"></span><button class="pri" id="edit">Редактировать</button></div></div>'
        : '<div class="card"><label style="margin-top:0">Придумай тег</label><input id="claim" placeholder="например, alex"><div class="row"><button class="pri" id="doclaim">Занять и создать страницу</button><span class="msg" id="cmsg" style="margin:0"></span></div></div>') +
      '<div class="card"><h3>Настройки</h3><p class="mut" style="margin:.2rem 0">Ключ, бэкап и импорт — нажми иконку noet в браузере. Ключ это твоя личность, он живёт в расширении.</p><p class="mut" style="margin:.2rem 0">Язык: Русский <span style="opacity:.6">(English скоро)</span></p></div>';

    wireProfile();
  }

  function wireProfile() {
    $('#psave').onclick = async function () { var m = $('#pmsg'); m.className = 'msg'; m.textContent = 'Сохраняю…';
      try { var p = { name: $('#p_name').value.trim(), picture: $('#p_pic').value.trim(), about: $('#p_about').value.trim() }; await noet.publish({ kind: 0, tags: [], content: JSON.stringify(p) }); PROFILE = p; m.className = 'msg ok'; m.textContent = 'Сохранено'; setTimeout(home, 600); }
      catch (e) { m.className = 'msg err'; m.textContent = 'Не вышло'; } };
    var pen = $('#pen'); if (pen) pen.onclick = function () { editingTag = true; home(); var th = $('#th'); if (th) { th.focus(); th.select(); } };
    var tx = $('#tx'); if (tx) tx.onclick = function () { editingTag = false; home(); };
    var tok = $('#tok'); if (tok) tok.onclick = function () { changeTag($('#th').value, $('#tmsg')); };
    var th = $('#th'); if (th) th.addEventListener('keydown', function (e) { if (e.key === 'Enter') changeTag(th.value, $('#tmsg')); if (e.key === 'Escape') { editingTag = false; home(); } });
    var dc = $('#doclaim'); if (dc) dc.onclick = function () { claimNew(($('#claim').value || ''), $('#cmsg')); };
    var ed = $('#edit'); if (ed) ed.onclick = function () { openEditor(); };
  }

  // смена ТЕГА: новое имя занимается, страница переезжает, старое имя ОСВОБОЖДАЕТСЯ
  async function changeTag(input, m) {
    var handle = (input || '').trim().toLowerCase().replace(/[^a-z0-9-]/g, ''); var name = handle + '.me';
    if (!handle) { m.className = 'msg err'; m.textContent = 'Впиши имя.'; return; }
    if (name === NAME) { editingTag = false; home(); return; }
    m.className = 'msg'; m.textContent = '…';
    try {
      var taken = (await noet.query({ kinds: [31111], '#d': [name], limit: 5 })).filter(function (e) { return e.pubkey !== PK; });
      if (taken.length) { m.className = 'msg err'; m.textContent = 'Занято.'; return; }
      await noet.publish({ kind: 31111, tags: [['d', name], ['t', 'noet-name'], ['target', '']] });
      var html = (PAGE && PAGE.html) || pageFromText(PROFILE.name || handle, 'Это моя страница в noet.');
      await noet.publish({ kind: 31002, tags: [['d', name]], content: JSON.stringify({ html: html, title: PROFILE.name || handle, mode: 'html' }) });
      if (CLAIMID) { try { await noet.publish({ kind: 5, tags: [['e', CLAIMID]] }); } catch (e) {} }   // освободить старое имя
      editingTag = false; await load();
    } catch (e) { m.className = 'msg err'; m.textContent = 'Не вышло.'; }
  }
  async function claimNew(input, m) {
    var handle = (input || '').trim().toLowerCase().replace(/[^a-z0-9-]/g, ''); var name = handle + '.me';
    if (!handle) { m.className = 'msg err'; m.textContent = 'Впиши имя.'; return; }
    m.className = 'msg'; m.textContent = 'Занимаю…';
    try { var taken = (await noet.query({ kinds: [31111], '#d': [name], limit: 5 })).filter(function (e) { return e.pubkey !== PK; });
      if (taken.length) { m.className = 'msg err'; m.textContent = 'Занято.'; return; }
      await noet.publish({ kind: 31111, tags: [['d', name], ['t', 'noet-name'], ['target', '']] });
      await noet.publish({ kind: 31002, tags: [['d', name]], content: JSON.stringify({ html: pageFromText(PROFILE.name || handle, 'Это моя страница в noet.'), title: PROFILE.name || handle, mode: 'html' }) });
      await load(); } catch (e) { m.className = 'msg err'; m.textContent = 'Не вышло.'; }
  }

  function openEditor() { mode = 'text'; edTitle = ''; edBody = ''; edHtml = ''; if (PAGE && PAGE.html) { mode = 'html'; edHtml = PAGE.html; } editor(); }
  function editor() {
    var isHtml = mode === 'html';
    $('#app').innerHTML = '<div class="row" style="margin:0 0 1rem"><button class="gho" id="back">← назад</button><span class="mut">' + esc(NAME) + '</span><span class="sp"></span><div class="seg"><button id="mt" class="' + (isHtml ? '' : 'on') + '">Текст</button><button id="mh" class="' + (isHtml ? 'on' : '') + '">HTML</button></div><button class="pri" id="pub">Опубликовать</button></div>' +
      '<div class="card">' + (isHtml ? '<textarea id="code" class="code" spellcheck="false" placeholder="&lt;!doctype html&gt;…">' + esc(edHtml) + '</textarea>' : '<label style="margin-top:0">Заголовок</label><input id="title" value="' + esc(edTitle) + '" placeholder="как назвать"><label>Текст</label><textarea id="body" placeholder="Пиши свободно. Пустая строка это новый абзац.">' + esc(edBody) + '</textarea>') + '<div class="msg" id="emsg"></div></div>';
    var save = function () { if ($('#code')) edHtml = $('#code').value; if ($('#title')) edTitle = $('#title').value; if ($('#body')) edBody = $('#body').value; };
    $('#back').onclick = function () { home(); }; $('#mt').onclick = function () { save(); mode = 'text'; editor(); }; $('#mh').onclick = function () { save(); mode = 'html'; editor(); };
    $('#pub').onclick = async function () { save(); var m = $('#emsg'), html, title;
      if (mode === 'html') { html = (edHtml || '').trim(); if (!html) { m.className = 'msg err'; m.textContent = 'Пусто.'; return; } var tm = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i); title = (tm ? tm[1] : '') || NAME; }
      else { title = (edTitle || '').trim(); if (!title && !(edBody || '').trim()) { m.className = 'msg err'; m.textContent = 'Пусто.'; return; } html = pageFromText(title, edBody); }
      m.className = 'msg'; m.textContent = 'Публикую…'; $('#pub').disabled = true;
      try { await noet.publish({ kind: 31002, tags: [['d', NAME]], content: JSON.stringify({ html: html, title: title, mode: 'html' }) }); PAGE = { html: html, title: title, mode: 'html' }; m.className = 'msg ok'; m.innerHTML = 'Готово. <a href="http://' + esc(NAME) + '/" target="_blank">' + esc(NAME) + '</a> обновлена.'; }
      catch (e) { m.className = 'msg err'; m.textContent = 'Не вышло.'; } $('#pub').disabled = false; };
  }

  if (!window.noet) { $('#app').innerHTML = '<div class="card mut">Открой через расширение noet.</div>'; return; }
  load();
})();
</script></body></html>
