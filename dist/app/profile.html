<!doctype html>
<html lang="ru" data-page="id.nt"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Профиль · noet</title>
<style>
  :root{--bg:#0a0a0d;--panel:#121219;--panel2:#16161f;--bd:#23232e;--bd2:#30303c;--fg:#f1f1f5;--mut:#9595a3;--acc:#7c5cff;--acc2:#9d8bff;--ok:#3ddc97;--err:#ff7b8a;--ring:0 0 0 3px rgba(124,92,255,.16)}
  *{box-sizing:border-box}html,body{margin:0;min-height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,system-ui,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:44rem;margin:0 auto;padding:1.8rem 1.3rem 6rem}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:16px;padding:1.4rem 1.5rem;box-shadow:0 10px 36px rgba(0,0,0,.32)}
  .idhead{display:flex;align-items:center;gap:1.1rem;margin-bottom:1.4rem}
  .av{width:76px;height:76px;border-radius:50%;flex:0 0 76px;object-fit:cover}
  .dn{font-size:1.55rem;font-weight:700;letter-spacing:-.4px;line-height:1.1}
  .tag{color:var(--mut);font-size:.98rem;margin-top:.25rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
  .pen{background:0;border:0;color:var(--mut);cursor:pointer;font-size:.85rem;padding:.12rem .3rem;border-radius:7px}.pen:hover{color:var(--acc2);background:var(--bg)}
  .tag input{background:var(--bg);border:1px solid var(--bd2);color:var(--fg);border-radius:9px;padding:.32rem .55rem;font:inherit;width:9rem;outline:none}.tag input:focus{border-color:var(--acc)}
  .ib{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:.32rem .6rem;cursor:pointer;font-weight:600}.ig{background:0;border:1px solid var(--bd2);color:var(--mut);border-radius:8px;padding:.32rem .55rem;cursor:pointer}
  .grid{display:grid;gap:.6rem 1.2rem;grid-template-columns:1fr}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr}.grid .full{grid-column:1/-1}}
  label{display:block;color:var(--mut);font-size:.8rem;margin:.2rem 0 .4rem}
  input,textarea{width:100%;background:var(--bg);border:1px solid var(--bd2);color:var(--fg);border-radius:11px;padding:.7rem .85rem;font:inherit;outline:none;transition:.15s}
  input:focus,textarea:focus{border-color:var(--acc);box-shadow:var(--ring)}input::placeholder,textarea::placeholder{color:#5a5a68}
  textarea{resize:vertical;min-height:5rem}
  .save{display:flex;align-items:center;gap:.8rem;margin-top:1.2rem}
  .pri{background:var(--acc);border:0;color:#fff;border-radius:11px;padding:.7rem 1.3rem;font:inherit;font-weight:600;cursor:pointer}.pri:hover{background:#6b4dff}
  .msg{font-size:.86rem;min-height:1em}.msg.ok{color:var(--ok)}.msg.err{color:var(--err)}
  .bar{display:flex;align-items:center;gap:1rem;margin-top:1.1rem;flex-wrap:wrap}
  .domlink{display:inline-flex;align-items:center;gap:.5rem;background:var(--panel2);border:1px solid var(--bd);border-radius:12px;padding:.6rem 1rem;color:var(--fg);text-decoration:none;font-weight:600;cursor:pointer}.domlink:hover{border-color:var(--acc)}.domlink .ar{color:var(--mut)}
  .lang{margin-left:auto;display:inline-flex;border:1px solid var(--bd2);border-radius:10px;overflow:hidden}.lang button{background:0;border:0;color:var(--mut);padding:.45rem .85rem;cursor:pointer;font:inherit}.lang button.on{background:var(--acc);color:#fff}
  .keyhint{color:var(--mut);font-size:.82rem;margin-top:1rem}.keyhint a{color:var(--acc2)}
  .mut{color:var(--mut)}a{color:var(--acc2)}
</style></head>
<body><div class="wrap"><div id="app"><div class="card mut">…</div></div></div>
<script>
(function () {
  var $ = function (s) { return document.querySelector(s); };
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); };
  var tagv = function (ev, k) { var t = (ev.tags || []).find(function (x) { return x[0] === k; }); return t ? t[1] : ''; };
  var hf = function (n) { return String(n || '').replace(/\.(me|nt)$/i, ''); };
  var isTest = function (n) { return /^p\d+-[0-9a-f]{5,}\.(me|nt)$/i.test(n); };

  var LANG = 'ru';
  var DICT = {
    ru: { noKey: 'Создай личность в расширении noet, потом обнови.', refresh: 'Обновить', dn: 'Имя', dnPh: 'как тебя показывать', avatar: 'Аватар', avatarPh: 'ссылка на картинку', about: 'О себе', aboutPh: 'пара слов о тебе', save: 'Сохранить', saving: '…', saved: 'Сохранено', failed: 'Не вышло.', noName: 'без имени', noTag: 'имя не занято', rename: 'сменить', myDomains: 'Мои домены', taken: 'Занято.', enter: 'Впиши имя.', keyHint: 'Ключ и бэкап живут в расширении: нажми иконку noet в браузере.' },
    en: { noKey: 'Create an identity in the noet extension, then refresh.', refresh: 'Refresh', dn: 'Name', dnPh: 'how to show you', avatar: 'Avatar', avatarPh: 'image link', about: 'About', aboutPh: 'a few words about you', save: 'Save', saving: '…', saved: 'Saved', failed: 'Failed.', noName: 'no name', noTag: 'no name yet', rename: 'change', myDomains: 'My domains', taken: 'Taken.', enter: 'Enter a name.', keyHint: 'Your key and backup live in the extension: click the noet icon in the browser.' }
  };
  var T = function (k) { return (DICT[LANG] || DICT.ru)[k] || DICT.ru[k] || k; };

  var PK = null, PROFILE = {}, TAG = null, CLAIMID = null, editing = false;
  function avatar(pk, name, pic) { if (pic && /^(https?:|data:)/i.test(pic)) return pic; var h = 0, seed = pk || name || '?'; for (var i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0; var hue = h % 360, ch = (name || '').trim() ? name.trim()[0].toUpperCase() : '';
    return 'data:image/svg+xml,' + encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='76' height='76'><rect width='76' height='76' rx='38' fill='hsl(" + hue + " 60% 50%)'/>" + (ch ? "<text x='38' y='51' font-family='system-ui' font-size='36' font-weight='600' fill='white' text-anchor='middle'>" + esc(ch) + "</text>" : "") + "</svg>"); }
  function pageFromText(title, body) { return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + esc(title) + '</title><style>body{font:18px/1.7 -apple-system,system-ui,sans-serif;background:#0d0d12;color:#ececf2;max-width:40rem;margin:0 auto;padding:3.5rem 1.3rem}h1{color:#fff;font-size:2.1rem;margin:0 0 1rem}p{margin:0 0 1.1rem}a{color:#9d8bff}</style></head><body><h1>' + esc(title) + '</h1>\n  <p>' + esc(body) + '</p>\n</body></html>'; }

  async function load() {
    try { PK = (await noet.me()).pubkey; } catch (e) { PK = null; }
    if (!PK) { $('#app').innerHTML = '<div class="card">' + esc(T('noKey')) + ' <div style="margin-top:.8rem"><button class="pri" id="rl">' + esc(T('refresh')) + '</button></div></div>'; $('#rl').onclick = function () { location.reload(); }; return; }
    var evs = await noet.query([{ kinds: [31111], authors: [PK], limit: 50 }, { kinds: [0], authors: [PK], limit: 1 }, { kinds: [5], authors: [PK], limit: 200 }]);
    var del = {}; evs.filter(function (e) { return e.kind === 5; }).forEach(function (e) { (e.tags || []).forEach(function (t) { if (t[0] === 'e') del[t[1]] = 1; }); });
    var live = evs.filter(function (e) { return e.kind === 31111 && /\.(me|nt)$/i.test(tagv(e, 'd')) && !isTest(tagv(e, 'd')) && !del[e.id]; });
    var best = {}; live.forEach(function (c) { var n = tagv(c, 'd'); if (!best[n] || c.created_at < best[n].created_at) best[n] = c; });
    var domains = Object.keys(best).map(function (n) { return best[n]; }).sort(function (a, b) { return a.created_at - b.created_at; });
    var p0 = evs.find(function (e) { return e.kind === 0; }); try { PROFILE = p0 ? JSON.parse(p0.content) : {}; } catch (e) { PROFILE = {}; }
    LANG = PROFILE.lang === 'en' ? 'en' : 'ru'; document.documentElement.lang = LANG;
    var names = domains.map(function (c) { return tagv(c, 'd'); });
    TAG = (PROFILE.primary && names.indexOf(PROFILE.primary) >= 0) ? PROFILE.primary : (names[0] || null);
    var pc = domains.find(function (c) { return tagv(c, 'd') === TAG; }); CLAIMID = pc ? pc.id : null;
    view();
  }

  function tagHtml() {
    if (!TAG) return '<div class="tag">' + esc(T('noTag')) + '</div>';
    if (!editing) return '<div class="tag">@' + esc(hf(TAG)) + ' <button class="pen" id="pen" title="' + esc(T('rename')) + '">✎</button></div>';
    return '<div class="tag">@<input id="th" value="' + esc(hf(TAG)) + '" maxlength="32"> <button class="ib" id="tok">✓</button> <button class="ig" id="tx">✕</button> <span class="msg" id="tmsg"></span></div>';
  }

  function view() {
    var dn = PROFILE.name || (TAG ? hf(TAG) : '') || T('noName');
    $('#app').innerHTML =
      '<div class="card"><div class="idhead"><img class="av" src="' + avatar(PK, dn, PROFILE.picture) + '"><div><div class="dn">' + esc(dn) + '</div>' + tagHtml() + '</div></div>' +
        '<div class="grid"><div><label>' + esc(T('dn')) + '</label><input id="p_name" value="' + esc(PROFILE.name || '') + '" placeholder="' + esc(T('dnPh')) + '"></div>' +
          '<div><label>' + esc(T('avatar')) + '</label><input id="p_pic" value="' + esc(PROFILE.picture || '') + '" placeholder="' + esc(T('avatarPh')) + '"></div>' +
          '<div class="full"><label>' + esc(T('about')) + '</label><textarea id="p_about" placeholder="' + esc(T('aboutPh')) + '">' + esc(PROFILE.about || '') + '</textarea></div></div>' +
        '<div class="save"><button class="pri" id="psave">' + esc(T('save')) + '</button><span class="msg" id="pmsg"></span></div>' +
        '<div class="bar"><a class="domlink" data-go="domains.nt">' + esc(T('myDomains')) + ' <span class="ar">→</span></a>' +
          '<span class="lang"><button id="lru" class="' + (LANG === 'ru' ? 'on' : '') + '">RU</button><button id="len" class="' + (LANG === 'en' ? 'on' : '') + '">EN</button></span></div>' +
        '<div class="keyhint">' + esc(T('keyHint')) + '</div></div>';
    wire();
  }

  function wire() {
    $('#psave').onclick = saveProfile;
    var pen = $('#pen'); if (pen) pen.onclick = function () { editing = true; view(); var th = $('#th'); if (th) { th.focus(); th.select(); } };
    var tx = $('#tx'); if (tx) tx.onclick = function () { editing = false; view(); };
    var tok = $('#tok'); if (tok) tok.onclick = function () { rename($('#th').value, $('#tmsg')); };
    var th = $('#th'); if (th) th.addEventListener('keydown', function (e) { if (e.key === 'Enter') rename(th.value, $('#tmsg')); if (e.key === 'Escape') { editing = false; view(); } });
    $('#lru').onclick = function () { setLang('ru'); }; $('#len').onclick = function () { setLang('en'); };
    document.querySelectorAll('a[data-go]').forEach(function (a) { a.onclick = function (e) { e.preventDefault(); noet.go('http://' + a.dataset.go + '/'); }; });
  }

  async function pub(p) { var x = Object.assign({}, PROFILE, p); await noet.publish({ kind: 0, tags: [], content: JSON.stringify(x) }); PROFILE = x; }
  function saveProfile() { var m = $('#pmsg'); m.className = 'msg'; m.textContent = T('saving');
    pub({ name: $('#p_name').value.trim(), picture: $('#p_pic').value.trim(), about: $('#p_about').value.trim() }).then(function () { m.className = 'msg ok'; m.textContent = T('saved'); setTimeout(view, 700); }).catch(function () { m.className = 'msg err'; m.textContent = T('failed'); }); }
  async function setLang(l) { if (l === LANG) return; LANG = l; document.documentElement.lang = l; view(); try { await pub({ lang: l }); } catch (e) {} }

  // быстрое переименование тега: занять новое имя, перенести страницу, освободить старое
  async function rename(input, m) {
    var h = (input || '').trim().toLowerCase().replace(/[^a-z0-9-]/g, ''); var name = h + '.me';
    if (!h) { m.className = 'msg err'; m.textContent = T('enter'); return; }
    if (name === TAG) { editing = false; view(); return; }
    m.className = 'msg'; m.textContent = '…';
    try {
      var taken = (await noet.query({ kinds: [31111], '#d': [name], limit: 5 })).filter(function (e) { return e.pubkey !== PK; });
      if (taken.length) { m.className = 'msg err'; m.textContent = T('taken'); return; }
      await noet.publish({ kind: 31111, tags: [['d', name], ['t', 'noet-name'], ['target', '']] });
      var old = TAG ? (await noet.query({ kinds: [31002], authors: [PK], '#d': [TAG], limit: 1 }))[0] : null; var html = '';
      if (old) { try { html = JSON.parse(old.content).html || ''; } catch (e) {} }
      await noet.publish({ kind: 31002, tags: [['d', name]], content: JSON.stringify({ html: html || pageFromText(PROFILE.name || h, T('about')), title: PROFILE.name || h, mode: 'html' }) });
      if (CLAIMID) { try { await noet.publish({ kind: 5, tags: [['e', CLAIMID]] }); } catch (e) {} }
      await pub({ primary: name }); editing = false; await load();
    } catch (e) { m.className = 'msg err'; m.textContent = T('failed'); }
  }

  if (!window.noet) { $('#app').innerHTML = '<div class="card mut">Открой через расширение noet.</div>'; return; }
  load();
})();
</script></body></html>
